name: Build Amino Brief

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: amino-brief-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate wrangler config
        run: npx wrangler deploy --dry-run --outdir=/tmp/wrangler-dry-run
